<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — JackOne</title>
<link rel="stylesheet" href="/h5/css/style.css">
</head><body>
<script src="/h5/js/i18n.js"></script>
<script src="/h5/js/api.js"></script>
<script src="/h5/js/layout.js"></script>

<div style="text-align:center;padding:36px 0 8px;position:relative;">
    <div style="display:inline-grid;place-items:center;width:80px;height:80px;border-radius:50%;
                background:var(--gold-grad);color:#1a1407;font-weight:900;font-size:30px;
                box-shadow:var(--gold-glow),inset 0 0 0 3px rgba(255,255,255,.25);">
        <svg viewBox="0 0 40 40" width="40" height="40" fill="currentColor" style="display:block;">
            <path d="M8 17 L11 11 L14.5 15.5 L20 8 L25.5 15.5 L29 11 L32 17 Z"/>
            <rect x="8" y="17" width="24" height="2.5"/>
            <path d="M14 24 L21.5 20 L21.5 32 L27 32 L27 34.5 L13 34.5 L13 32 L17.5 32 L17.5 25 L14 26.5 Z"/>
        </svg>
    </div>
    <div style="margin-top:14px;font-size:24px;font-weight:900;color:var(--tx-hi);letter-spacing:-.3px;">JackOne</div>
    <div style="font-size:11px;color:var(--gold-2);font-weight:700;letter-spacing:2px;margin-top:4px;">ONE SHOT · ONE JACKPOT</div>
</div>

<div class="field"><label data-i18n="username"></label><input id="u" autocomplete="username"></div>
<div class="field"><label data-i18n="password"></label><input id="p" type="password" autocomplete="current-password"></div>
<div class="field">
    <button class="btn btn-primary btn-block" id="btnLogin" data-i18n="login"></button>
</div>
<div class="field right">
    <a href="/h5/register.html" data-i18n="register" style="color:var(--gold-2);font-weight:600;font-size:13px;"></a>
</div>

<div class="field">
    <div class="muted" style="font-size:11px;margin-bottom:10px;text-align:center;font-weight:600;letter-spacing:.5px;text-transform:uppercase;">— Quick login (demo) —</div>
    <div id="quickLogin" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
</div>

<!-- Admin entry point -->
<div style="margin:24px 16px 32px;padding-top:20px;border-top:1px solid var(--bd);">
    <div style="font-size:11px;color:var(--tx-mute);font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:10px;">Staff Access</div>
    <a href="/admin/login.html"
       style="display:flex;align-items:center;justify-content:center;gap:8px;
              padding:12px;border-radius:12px;
              border:1px solid rgba(212,175,55,.25);
              background:linear-gradient(135deg,rgba(212,175,55,.12),rgba(212,175,55,.02));
              color:var(--gold-2);font-weight:700;font-size:13px;
              transition:all .2s;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Admin Panel Login
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 6l6 6-6 6"/></svg>
    </a>
</div>

<script>
Layout.mount('me');

const DEMO_ACCOUNTS = [
    { u: 'demo',  p: 'demo123',  label: 'Demo User',  hint: '$500+ balance' },
    { u: 'alice', p: 'alice123', label: 'Alice',      hint: 'Referred by demo' },
];

async function doLogin(username, password) {
    try {
        const r = await API.post('/api/auth/login', { username, password });
        API.token(r.token);
        location.href = '/h5/me.html';
    } catch (e) { toast(e.message); }
}

document.getElementById('btnLogin').addEventListener('click', () => {
    const u = document.getElementById('u').value.trim();
    const p = document.getElementById('p').value;
    if (!u || !p) return toast('Enter username & password');
    doLogin(u, p);
});

['u','p'].forEach(id => document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
}));

const ql = document.getElementById('quickLogin');
ql.innerHTML = DEMO_ACCOUNTS.map((a, i) => `
    <button class="btn btn-outline" data-i="${i}" style="text-align:left;padding:10px 12px;flex-direction:column;align-items:flex-start;">
        <div style="font-weight:800;font-size:13px;color:var(--gold-2);">@${a.u}</div>
        <div class="muted" style="font-size:11px;font-weight:500;margin-top:2px;">${a.label} · ${a.hint}</div>
    </button>
`).join('');
ql.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
        const a = DEMO_ACCOUNTS[+btn.dataset.i];
        document.getElementById('u').value = a.u;
        document.getElementById('p').value = a.p;
        doLogin(a.u, a.p);
    });
});
</script>
</body></html>
