<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Upload Site Logo — JackOne Admin</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/h5/css/style.css">
<style>
    body { padding: 24px 16px 80px; max-width: 640px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 4px; color: var(--tx-hi); }
    .sub { color: var(--tx-mute); font-size: 13px; margin-bottom: 24px; }

    .card {
        background: var(--bg-1); border: 1px solid var(--bd);
        border-radius: 18px; padding: 20px; margin-bottom: 16px;
    }
    .card h2 { font-size: 14px; font-weight: 700; color: var(--gold-2);
        letter-spacing: 1px; text-transform: uppercase; margin: 0 0 12px; }

    label { display: block; font-size: 12px; color: var(--tx-mute);
        font-weight: 600; margin-bottom: 6px; }
    input[type=text], input[type=password] {
        width: 100%; box-sizing: border-box;
        background: rgba(255,255,255,.04); border: 1px solid var(--bd);
        border-radius: 12px; padding: 12px 14px; color: var(--tx-hi);
        font-size: 14px; outline: 0;
    }
    input:focus { border-color: var(--gold); }

    .btn {
        background: var(--gold-grad); color: #1a1407;
        border: 0; border-radius: 12px; padding: 12px 22px;
        font-weight: 800; font-size: 14px; cursor: pointer;
        display: inline-flex; align-items: center; gap: 8px;
    }
    .btn[disabled] { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
        background: transparent; color: var(--tx-mid);
        border: 1px solid var(--bd);
    }

    .drop {
        border: 2px dashed var(--bd); border-radius: 16px;
        padding: 36px 20px; text-align: center;
        background: rgba(255,255,255,.02);
        transition: border-color .2s, background .2s;
        cursor: pointer;
    }
    .drop.is-hover { border-color: var(--gold); background: rgba(212,175,55,.06); }
    .drop input { display: none; }
    .drop .hint { color: var(--tx-mute); font-size: 12px; margin-top: 8px; }

    .preview-row { display: flex; gap: 24px; align-items: center;
        margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--bd); }
    .preview-row.hidden { display: none; }
    .preview-large {
        width: 80px; height: 80px; border-radius: 50%;
        background: var(--gold-grad);
        display: grid; place-items: center; flex-shrink: 0;
        box-shadow: var(--gold-glow);
        overflow: hidden;
    }
    .preview-large img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-topbar {
        width: 38px; height: 38px; border-radius: 50%;
        background: var(--gold-grad);
        display: grid; place-items: center; flex-shrink: 0;
        overflow: hidden;
    }
    .preview-topbar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-favicon { width: 20px; height: 20px; border-radius: 4px; overflow: hidden; }
    .preview-favicon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-meta { color: var(--tx-mute); font-size: 12px; flex: 1; }
    .preview-meta b { color: var(--tx-hi); display: block; margin-bottom: 4px; font-size: 13px; }

    .msg { font-size: 13px; margin-top: 12px; min-height: 18px; font-weight: 600; }
    .msg.err { color: var(--red-2, #ff6b6b); }
    .msg.ok { color: var(--gold-2); }

    .hidden { display: none !important; }

    .current { display: flex; gap: 14px; align-items: center; }
    .current .preview-large { width: 64px; height: 64px; }
    .current .meta { font-size: 12px; color: var(--tx-mute); }
    .current .meta b { color: var(--tx-hi); display: block; font-size: 13px; }
</style>
</head>
<body>

<h1>Upload Site Logo</h1>
<div class="sub">Replace the topbar disc icon and favicon. Accepts PNG, JPG, WebP, or SVG (max 5MB).</div>

<!-- Step 1: Login -->
<div class="card" id="loginCard">
    <h2>Step 1 — Admin login</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div>
            <label for="u">Username</label>
            <input id="u" type="text" value="admin" autocomplete="username">
        </div>
        <div>
            <label for="p">Password</label>
            <input id="p" type="password" autocomplete="current-password">
        </div>
    </div>
    <button class="btn" id="loginBtn">Sign in</button>
    <div class="msg err" id="loginMsg"></div>
</div>

<!-- Step 2: Upload -->
<div class="card hidden" id="uploadCard">
    <h2>Step 2 — Choose your logo</h2>

    <div id="currentLogo" class="current hidden" style="margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--bd);">
        <div class="preview-large"><img id="currentImg" alt=""></div>
        <div class="meta"><b>Current logo</b><span id="currentName"></span></div>
    </div>

    <label class="drop" id="drop" for="fileInput">
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,image/svg+xml">
        <div style="font-weight:700;color:var(--tx-hi);">Drop image here or click to pick</div>
        <div class="hint">PNG, JPG, WebP, or SVG · up to 5MB</div>
    </label>

    <div class="preview-row hidden" id="preview">
        <div class="preview-large"><img id="prevLarge" alt=""></div>
        <div class="preview-topbar"><img id="prevTopbar" alt=""></div>
        <div class="preview-favicon"><img id="prevFavicon" alt=""></div>
        <div class="preview-meta">
            <b id="prevName"></b>
            <span id="prevSize"></span>
        </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn" id="uploadBtn" disabled>Upload &amp; apply</button>
        <button class="btn btn-ghost" id="clearBtn">Clear</button>
    </div>
    <div class="msg" id="uploadMsg"></div>
</div>

<!-- Step 3: Done -->
<div class="card hidden" id="doneCard">
    <h2>Done</h2>
    <div style="display:flex;gap:14px;align-items:center;">
        <div class="preview-large"><img id="doneImg" alt=""></div>
        <div>
            <div style="font-weight:700;color:var(--tx-hi);margin-bottom:4px;">Logo updated</div>
            <div style="color:var(--tx-mute);font-size:13px;">The topbar disc will use this on the next page load.</div>
        </div>
    </div>
    <div style="margin-top:18px;display:flex;gap:10px;">
        <a class="btn" href="/h5/index.html">View homepage</a>
        <button class="btn btn-ghost" id="anotherBtn">Upload another</button>
    </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

let chosenFile = null;
let adminToken = localStorage.getItem('lm.admin.token') || null;

// If we already have a stored admin token from a prior session, skip Step 1.
if (adminToken) {
    document.addEventListener('DOMContentLoaded', () => {
        $('loginCard').classList.add('hidden');
        $('uploadCard').classList.remove('hidden');
        loadCurrentLogo();
    });
}

/* ---------- step 1: login ---------- */
$('loginBtn').addEventListener('click', async () => {
    const username = $('u').value.trim();
    const password = $('p').value;
    const msg = $('loginMsg');
    msg.textContent = '';
    if (!username || !password) { msg.textContent = 'Enter username and password.'; return; }
    $('loginBtn').disabled = true;
    try {
        const r = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ username, password }),
        });
        const j = await r.json();
        if (!r.ok || j.ok === false) {
            msg.textContent = j.error || j.msg || j.message || 'Login failed.';
            $('loginBtn').disabled = false;
            return;
        }
        adminToken = (j.data && j.data.token) || j.token;
        if (adminToken) localStorage.setItem('lm.admin.token', adminToken);
        $('loginCard').classList.add('hidden');
        $('uploadCard').classList.remove('hidden');
        loadCurrentLogo();
    } catch (e) {
        msg.textContent = 'Network error: ' + e.message;
        $('loginBtn').disabled = false;
    }
});
$('p').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('loginBtn').click(); });

/* ---------- show current logo if any ---------- */
async function loadCurrentLogo() {
    try {
        const r = await fetch('/h5/img/site-logo.json?v=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        if (j && j.url) {
            $('currentImg').src = j.url;
            $('currentName').textContent = j.url.split('?')[0].split('/').pop();
            $('currentLogo').classList.remove('hidden');
        }
    } catch (e) { /* no current logo — fine */ }
}

/* ---------- step 2: pick + preview ---------- */
const drop = $('drop');
const fileInput = $('fileInput');

['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, (e) => {
    e.preventDefault(); drop.classList.add('is-hover');
}));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, (e) => {
    e.preventDefault(); drop.classList.remove('is-hover');
}));
drop.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) handleFile(file);
});
fileInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) handleFile(file);
});

function handleFile(file) {
    const allowed = ['image/png', 'image/jpeg', 'image/webp', 'image/svg+xml'];
    if (!allowed.includes(file.type)) {
        $('uploadMsg').textContent = 'Unsupported type: ' + (file.type || 'unknown');
        $('uploadMsg').className = 'msg err';
        return;
    }
    if (file.size > 5 * 1024 * 1024) {
        $('uploadMsg').textContent = 'File too large (' + (file.size / 1024 / 1024).toFixed(1) + 'MB, max 5MB).';
        $('uploadMsg').className = 'msg err';
        return;
    }
    chosenFile = file;
    const url = URL.createObjectURL(file);
    $('prevLarge').src = url;
    $('prevTopbar').src = url;
    $('prevFavicon').src = url;
    $('prevName').textContent = file.name;
    $('prevSize').textContent = (file.size / 1024).toFixed(1) + ' KB · ' + file.type;
    $('preview').classList.remove('hidden');
    $('uploadBtn').disabled = false;
    $('uploadMsg').textContent = '';
}

$('clearBtn').addEventListener('click', () => {
    chosenFile = null;
    fileInput.value = '';
    $('preview').classList.add('hidden');
    $('uploadBtn').disabled = true;
    $('uploadMsg').textContent = '';
});

/* ---------- step 3: upload ---------- */
$('uploadBtn').addEventListener('click', async () => {
    if (!chosenFile) return;
    const msg = $('uploadMsg');
    msg.textContent = 'Uploading…'; msg.className = 'msg';
    $('uploadBtn').disabled = true;
    try {
        const fd = new FormData();
        fd.append('file', chosenFile);
        const r = await fetch('/api/admin/upload-site-logo', {
            method: 'POST',
            credentials: 'include',
            headers: adminToken ? { 'Authorization': 'Bearer ' + adminToken } : {},
            body: fd,
        });
        const j = await r.json();
        if (!r.ok || j.ok === false) {
            // Token may have expired — drop it and ask for re-login.
            if (r.status === 401) {
                localStorage.removeItem('lm.admin.token');
                adminToken = null;
                $('uploadCard').classList.add('hidden');
                $('loginCard').classList.remove('hidden');
                $('loginMsg').textContent = 'Session expired — please sign in again.';
                return;
            }
            msg.textContent = j.error || j.msg || j.message || ('Upload failed (HTTP ' + r.status + ')');
            msg.className = 'msg err';
            $('uploadBtn').disabled = false;
            return;
        }
        const finalUrl = (j.data && j.data.url) || j.url;
        $('doneImg').src = finalUrl;
        $('uploadCard').classList.add('hidden');
        $('doneCard').classList.remove('hidden');
    } catch (e) {
        msg.textContent = 'Network error: ' + e.message;
        msg.className = 'msg err';
        $('uploadBtn').disabled = false;
    }
});

$('anotherBtn').addEventListener('click', () => {
    chosenFile = null;
    fileInput.value = '';
    $('preview').classList.add('hidden');
    $('uploadBtn').disabled = true;
    $('uploadMsg').textContent = '';
    $('doneCard').classList.add('hidden');
    $('uploadCard').classList.remove('hidden');
    loadCurrentLogo();
});
</script>
</body>
</html>
