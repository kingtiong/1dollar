<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Wins — JackOne</title>
<link rel="stylesheet" href="/h5/css/style.css">
<style>
    /* Win-detail card — page-local, since the original reveal-card was just a grid tile */
    .win-list { display: flex; flex-direction: column; gap: 14px; padding: 12px; }
    .win-card {
        background: var(--bg-1); border: 1px solid var(--bd);
        border-radius: 18px; overflow: hidden;
        display: flex; flex-direction: column;
    }
    .win-head { display: flex; gap: 12px; padding: 14px; align-items: center; }
    .win-img {
        width: 72px; height: 72px; border-radius: 14px;
        background: var(--bg-2); overflow: hidden; flex-shrink: 0;
    }
    .win-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .win-meta { flex: 1; min-width: 0; }
    .win-title {
        font-weight: 700; color: var(--tx-hi); font-size: 14px;
        line-height: 1.3; margin-bottom: 4px;
        overflow: hidden; text-overflow: ellipsis;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .win-sub { font-size: 12px; color: var(--tx-mute); display: flex; gap: 10px; align-items: center; }
    .win-sub .code { color: var(--gold-2); font-weight: 700; font-family: ui-monospace, Menlo, monospace; }

    .win-status-row {
        padding: 10px 14px; border-top: 1px solid var(--bd);
        display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .win-pill {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 11px; font-weight: 700;
        padding: 4px 10px; border-radius: 999px;
        text-transform: uppercase; letter-spacing: .5px;
    }
    .win-pill::before {
        content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    }
    .win-pill.pending   { background: rgba(234,88,12,.12);  color: #fb923c; }
    .win-pill.shipped   { background: rgba(59,130,246,.12); color: #60a5fa; }
    .win-pill.delivered { background: rgba(168,85,247,.12); color: #c084fc; }
    .win-pill.claimed   { background: rgba(34,197,94,.12);  color: #4ade80; }

    .win-detail { padding: 12px 14px; border-top: 1px solid var(--bd); font-size: 12px; }
    .win-detail .row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
    .win-detail .row:last-child { margin-bottom: 0; }
    .win-detail .label { color: var(--tx-mute); flex-shrink: 0; min-width: 64px; }
    .win-detail .val { color: var(--tx-hi); flex: 1; word-break: break-word; }
    .win-detail .val.mono { font-family: ui-monospace, Menlo, monospace; color: var(--gold-2); }
    .win-detail .val .phone { color: var(--gold-2); font-weight: 600; }
    .win-detail .no-addr {
        color: #fb923c;
        padding: 8px 10px; background: rgba(234,88,12,.08);
        border: 1px dashed rgba(234,88,12,.3); border-radius: 10px;
    }
    .win-detail .no-addr a {
        color: var(--gold-2); text-decoration: underline; margin-left: 6px;
    }

    .win-cta { padding: 12px 14px; border-top: 1px solid var(--bd); }
    .win-cta button {
        width: 100%; padding: 12px 16px; border: 0; border-radius: 12px;
        background: var(--gold-grad); color: #1a1407;
        font-weight: 800; font-size: 14px; cursor: pointer;
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .win-cta button[disabled] { opacity: .5; cursor: not-allowed; }

    /* Engagement-loop CTAs that appear once the prize is claimed. */
    .engage-row {
        padding: 12px 14px; border-top: 1px solid var(--bd);
        display: flex; gap: 8px; flex-wrap: wrap;
    }
    .engage-btn {
        flex: 1; min-width: 130px;
        padding: 10px 12px; border: 1px solid var(--gold-3); border-radius: 10px;
        background: rgba(212,175,55,.08); color: var(--gold-2);
        font-weight: 700; font-size: 12px; cursor: pointer;
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .engage-btn:hover { background: rgba(212,175,55,.14); }
    .engage-btn .ico { font-size: 14px; }

    .proof-list { margin-top: 10px; }
    .proof-row {
        display: flex; gap: 8px; align-items: center;
        padding: 6px 10px; background: rgba(255,255,255,.03);
        border-radius: 8px; font-size: 11px; margin-bottom: 4px;
    }
    .proof-row .kind { color: var(--tx-mute); }
    .proof-row .status-pill {
        font-size: 10px; font-weight: 700; padding: 2px 8px;
        border-radius: 999px; margin-left: auto;
    }
    .proof-row .status-pill.pending  { background: rgba(234,88,12,.15);  color: #fb923c; }
    .proof-row .status-pill.approved { background: rgba(34,197,94,.15);  color: #4ade80; }
    .proof-row .status-pill.rejected { background: rgba(255,59,59,.15);  color: #ff6b6b; }
    .proof-row .reason { color: #ff6b6b; font-style: italic; font-size: 10px; }

    /* Bottom-sheet style modal */
    .sheet-bg {
        position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 80;
        display: none; align-items: flex-end; justify-content: center;
    }
    .sheet-bg.show { display: flex; }
    .sheet {
        width: 100%; max-width: 540px;
        background: var(--bg-1); border-top-left-radius: 22px; border-top-right-radius: 22px;
        padding: 20px 18px 28px;
        max-height: 88vh; overflow-y: auto;
    }
    .sheet h3 { margin: 0 0 14px; font-size: 16px; color: var(--tx-hi); }
    .sheet .tabs {
        display: flex; gap: 6px; margin-bottom: 14px;
        background: var(--bg-2); padding: 4px; border-radius: 10px;
    }
    .sheet .tabs button {
        flex: 1; padding: 8px; border: 0; border-radius: 8px;
        background: transparent; color: var(--tx-mid); font-size: 13px; font-weight: 700;
        cursor: pointer;
    }
    .sheet .tabs button.active {
        background: var(--gold-grad); color: #1a1407;
    }
    .sheet label { display: block; font-size: 12px; color: var(--tx-mute); margin: 10px 0 4px; }
    .sheet input[type=text], .sheet textarea, .sheet select {
        width: 100%; box-sizing: border-box;
        background: rgba(255,255,255,.04); border: 1px solid var(--bd);
        border-radius: 10px; padding: 10px 12px; color: var(--tx-hi);
        font-size: 14px; outline: 0; font-family: inherit;
    }
    .sheet textarea { resize: vertical; min-height: 60px; }
    .sheet input:focus, .sheet textarea:focus, .sheet select:focus { border-color: var(--gold); }
    .sheet .drop {
        border: 2px dashed var(--bd); border-radius: 12px;
        padding: 24px; text-align: center; cursor: pointer; color: var(--tx-mute);
        font-size: 13px;
    }
    .sheet .drop input { display: none; }
    .sheet .preview { margin-top: 10px; }
    .sheet .preview img { max-width: 100%; max-height: 220px; border-radius: 10px; display: block; }
    .sheet .actions { display: flex; gap: 8px; margin-top: 18px; }
    .sheet .actions button {
        flex: 1; padding: 12px; border: 0; border-radius: 10px;
        font-weight: 800; font-size: 14px; cursor: pointer;
    }
    .sheet .btn-pri { background: var(--gold-grad); color: #1a1407; }
    .sheet .btn-pri:disabled { opacity: .5; cursor: not-allowed; }
    .sheet .btn-sec { background: transparent; border: 1px solid var(--bd); color: var(--tx-mid); }
</style>
</head><body>
<script src="/h5/js/i18n.js"></script>
<script src="/h5/js/api.js"></script>
<script src="/h5/js/layout.js"></script>

<div class="section-title" data-i18n="my_wins"></div>
<div class="win-list" id="list"></div>

<!-- Proof upload modal -->
<div class="sheet-bg" id="proofSheet">
    <div class="sheet">
        <h3 data-i18n="upload_proof"></h3>
        <div class="tabs">
            <button class="active" id="tabPhoto" onclick="setProofKind('photo')" data-i18n="proof_photo"></button>
            <button id="tabVideo" onclick="setProofKind('video')" data-i18n="proof_video"></button>
        </div>
        <div id="proofPhotoPane">
            <label class="drop" for="proofFile" id="proofDrop">
                <input type="file" id="proofFile" accept="image/png,image/jpeg,image/webp">
                <div id="proofDropHint">Tap to choose a photo</div>
                <div class="preview" id="proofPreview"></div>
            </label>
        </div>
        <div id="proofVideoPane" style="display:none;">
            <label data-i18n="proof_video"></label>
            <input type="text" id="proofVideoUrl" data-i18n-ph="video_url_ph">
        </div>
        <label data-i18n="proof_note_ph"></label>
        <textarea id="proofNote" data-i18n-ph="proof_note_ph"></textarea>
        <div class="actions">
            <button class="btn-sec" onclick="closeProofSheet()" data-i18n="cancel"></button>
            <button class="btn-pri" id="proofSubmit" onclick="submitProof()" data-i18n="submit"></button>
        </div>
    </div>
</div>

<!-- Social share modal -->
<div class="sheet-bg" id="shareSheet">
    <div class="sheet">
        <h3 data-i18n="share_to_earn"></h3>
        <label data-i18n="platform"></label>
        <select id="sharePlatform">
            <option value="wechat">WeChat 微信</option>
            <option value="weibo">Weibo 微博</option>
            <option value="douyin">Douyin 抖音</option>
            <option value="tiktok">TikTok</option>
            <option value="twitter">Twitter / X</option>
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
            <option value="other">Other</option>
        </select>
        <label data-i18n="screenshot"></label>
        <label class="drop" for="shareFile">
            <input type="file" id="shareFile" accept="image/png,image/jpeg,image/webp">
            <div id="shareDropHint">Tap to choose a screenshot</div>
            <div class="preview" id="sharePreview"></div>
        </label>
        <label data-i18n="post_link_optional"></label>
        <input type="text" id="sharePostUrl" placeholder="https://...">
        <div class="actions">
            <button class="btn-sec" onclick="closeShareSheet()" data-i18n="cancel"></button>
            <button class="btn-pri" id="shareSubmit" onclick="submitShare()" data-i18n="submit"></button>
        </div>
    </div>
</div>

<script>
Layout.mount('me');

function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
}

function statusPill(status) {
    const cls = ['pending','shipped','delivered','claimed'].includes(status) ? status : 'pending';
    return `<span class="win-pill ${cls}">${I18N.t('status_' + cls)}</span>`;
}

function addressBlock(w) {
    if (!w.addr_name) {
        return `<div class="row"><div class="label">${I18N.t('ship_to')}</div>
            <div class="val"><div class="no-addr">
                ${I18N.t('no_address_set')}
                <a href="/h5/address.html">${I18N.t('add_address')}</a>
            </div></div></div>`;
    }
    const parts = [w.addr_line, w.addr_city, w.addr_province, w.addr_country].filter(Boolean);
    return `<div class="row"><div class="label">${I18N.t('ship_to')}</div>
        <div class="val">
            <div><b>${escapeHtml(w.addr_name)}</b> <span class="phone">${escapeHtml(w.addr_phone)}</span></div>
            <div style="color:var(--tx-mid);">${escapeHtml(parts.join(', '))}</div>
        </div></div>`;
}

function trackingRow(w) {
    if (!w.tracking) return '';
    return `<div class="row">
        <div class="label">${I18N.t('tracking_no')}</div>
        <div class="val mono">${escapeHtml(w.tracking)}</div>
    </div>`;
}

function timelineRow(w) {
    const steps = [];
    if (w.drawn_at)     steps.push([I18N.t('timeline_drawn'),     w.drawn_at]);
    if (w.shipped_at)   steps.push([I18N.t('timeline_shipped'),   w.shipped_at]);
    if (w.delivered_at) steps.push([I18N.t('timeline_delivered'), w.delivered_at]);
    if (w.claimed_at)   steps.push([I18N.t('timeline_received'),  w.claimed_at]);
    if (steps.length < 2) return '';
    return `<div class="row">
        <div class="label">${I18N.t('timeline')}</div>
        <div class="val" style="font-size:11px;line-height:1.6;">
            ${steps.map(([label, t]) =>
                `<div><span style="color:var(--tx-mute);">${label}:</span> ${escapeHtml(t)}</div>`
            ).join('')}
        </div>
    </div>`;
}

function ctaBlock(w) {
    if (w.status !== 'delivered') return '';
    return `<div class="win-cta">
        <button onclick="claim(${w.id}, this)">${I18N.t('confirm_received')}</button>
    </div>`;
}

function engageBlock(w) {
    if (w.status !== 'claimed') return '';
    return `<div class="engage-row">
        <button class="engage-btn" onclick="openProofSheet(${w.id})">
            <span class="ico">📷</span> ${I18N.t('upload_proof')}
        </button>
        <button class="engage-btn" onclick="openShareSheet(${w.id})">
            <span class="ico">🔗</span> ${I18N.t('share_to_earn')}
        </button>
    </div>
    <div class="win-detail" id="proofs-${w.id}"></div>`;
}

function proofRowsHtml(proofs) {
    if (!proofs.length) return '';
    return `<div class="proof-list">${proofs.map(p => `
        <div class="proof-row">
            <span class="kind">${p.kind === 'video' ? '🎬' : '📷'} ${p.kind}</span>
            <span class="status-pill ${p.status}">${I18N.t('status_' + p.status)}</span>
            ${p.status === 'rejected' && p.reject_reason
                ? `<div style="width:100%;" class="reason">${escapeHtml(p.reject_reason)}</div>`
                : ''}
            ${p.status === 'approved' && p.reward_draws > 0
                ? `<div style="width:100%;color:#4ade80;font-size:10px;">+${p.reward_draws} ${I18N.t('free_draws')}</div>`
                : ''}
        </div>`).join('')}
    </div>`;
}

async function refreshProofs(winId) {
    try {
        const all = await API.get('/api/me/proofs');
        const mine = all.filter(p => +p.winner_id === +winId);
        const target = document.getElementById('proofs-' + winId);
        if (target) target.innerHTML = proofRowsHtml(mine);
    } catch (e) { /* ignore */ }
}

function renderCard(w) {
    return `
    <div class="win-card" data-id="${w.id}">
        <div class="win-head">
            <div class="win-img"><img src="${escapeHtml(w.cover_image || '')}" alt=""></div>
            <div class="win-meta">
                <div class="win-title">${escapeHtml(I18N.pickName(w))}</div>
                <div class="win-sub">
                    <span>#${w.period_no}${I18N.get()==='zh'?'期':''}</span>
                    <span class="code">${escapeHtml(w.code)}</span>
                </div>
            </div>
        </div>
        <div class="win-status-row">
            ${statusPill(w.status)}
            <span style="color:var(--tx-mute);font-size:11px;margin-left:auto;">${w.drawn_at}</span>
        </div>
        <div class="win-detail">
            ${addressBlock(w)}
            ${trackingRow(w)}
            ${timelineRow(w)}
        </div>
        ${ctaBlock(w)}
        ${engageBlock(w)}
    </div>`;
}

async function claim(id, btn) {
    if (!confirm(I18N.t('confirm_received_q'))) return;
    btn.disabled = true;
    try {
        await API.post('/api/me/wins/' + id + '/claim', {});
        load();
    } catch (e) {
        btn.disabled = false;
        if (window.toast) toast(e.message); else alert(e.message);
    }
}

async function load() {
    if (!API.token()) return location.href = '/h5/login.html';
    const list = document.getElementById('list');
    try {
        const [rows, allProofs] = await Promise.all([
            API.get('/api/me/wins'),
            API.get('/api/me/proofs').catch(() => []),
        ]);
        list.innerHTML = rows.length
            ? rows.map(renderCard).join('')
            : `<div class="empty" style="padding:60px 20px;text-align:center;color:var(--tx-mute);">${I18N.t('empty_list')}</div>`;
        I18N.apply();
        // Populate proof lists per winner card
        rows.filter(w => w.status === 'claimed').forEach(w => {
            const mine = allProofs.filter(p => +p.winner_id === +w.id);
            const target = document.getElementById('proofs-' + w.id);
            if (target) target.innerHTML = proofRowsHtml(mine);
        });
    } catch (e) {
        if (window.toast) toast(e.message); else console.error(e);
    }
}

/* ===== Proof upload sheet ===== */
let proofKind = 'photo';
let proofFile = null;
let proofWinId = null;

function openProofSheet(winId) {
    proofWinId = winId;
    proofKind = 'photo';
    proofFile = null;
    document.getElementById('tabPhoto').classList.add('active');
    document.getElementById('tabVideo').classList.remove('active');
    document.getElementById('proofPhotoPane').style.display = '';
    document.getElementById('proofVideoPane').style.display = 'none';
    document.getElementById('proofFile').value = '';
    document.getElementById('proofVideoUrl').value = '';
    document.getElementById('proofNote').value = '';
    document.getElementById('proofPreview').innerHTML = '';
    document.getElementById('proofDropHint').textContent = I18N.t('tap_choose_photo');
    document.getElementById('proofSheet').classList.add('show');
}
function closeProofSheet() { document.getElementById('proofSheet').classList.remove('show'); }
function setProofKind(k) {
    proofKind = k;
    document.getElementById('tabPhoto').classList.toggle('active', k === 'photo');
    document.getElementById('tabVideo').classList.toggle('active', k === 'video');
    document.getElementById('proofPhotoPane').style.display = k === 'photo' ? '' : 'none';
    document.getElementById('proofVideoPane').style.display = k === 'video' ? '' : 'none';
}

document.getElementById('proofFile').addEventListener('change', (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    proofFile = f;
    const url = URL.createObjectURL(f);
    document.getElementById('proofPreview').innerHTML = `<img src="${url}">`;
    document.getElementById('proofDropHint').textContent = f.name;
});

async function submitProof() {
    if (!proofWinId) return;
    const btn = document.getElementById('proofSubmit');
    btn.disabled = true;
    try {
        const fd = new FormData();
        fd.append('kind', proofKind);
        fd.append('note', document.getElementById('proofNote').value);
        if (proofKind === 'photo') {
            if (!proofFile) { btn.disabled = false; toast(I18N.t('choose_photo_first')); return; }
            fd.append('file', proofFile);
        } else {
            const u = document.getElementById('proofVideoUrl').value.trim();
            if (!u) { btn.disabled = false; toast(I18N.t('enter_video_url')); return; }
            fd.append('media_url', u);
        }
        const r = await fetch('/api/me/wins/' + proofWinId + '/upload-proof', {
            method: 'POST', body: fd,
            headers: { 'Authorization': 'Bearer ' + API.token() },
            credentials: 'include',
        });
        const j = await r.json();
        if (!r.ok || j.ok === false) throw new Error(j.error || ('HTTP ' + r.status));
        closeProofSheet();
        toast(I18N.t('submitted_pending'));
        load();
    } catch (e) {
        toast(e.message);
    } finally {
        btn.disabled = false;
    }
}

/* ===== Social share sheet ===== */
let shareFile = null;
let shareWinId = null;

function openShareSheet(winId) {
    shareWinId = winId;
    shareFile = null;
    document.getElementById('shareFile').value = '';
    document.getElementById('sharePlatform').value = 'wechat';
    document.getElementById('sharePostUrl').value = '';
    document.getElementById('sharePreview').innerHTML = '';
    document.getElementById('shareDropHint').textContent = I18N.t('tap_choose_screenshot');
    document.getElementById('shareSheet').classList.add('show');
}
function closeShareSheet() { document.getElementById('shareSheet').classList.remove('show'); }

document.getElementById('shareFile').addEventListener('change', (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    shareFile = f;
    const url = URL.createObjectURL(f);
    document.getElementById('sharePreview').innerHTML = `<img src="${url}">`;
    document.getElementById('shareDropHint').textContent = f.name;
});

async function submitShare() {
    const btn = document.getElementById('shareSubmit');
    btn.disabled = true;
    try {
        if (!shareFile) { btn.disabled = false; toast(I18N.t('choose_screenshot_first')); return; }
        const fd = new FormData();
        fd.append('platform', document.getElementById('sharePlatform').value);
        fd.append('file', shareFile);
        const postUrl = document.getElementById('sharePostUrl').value.trim();
        if (postUrl) fd.append('post_url', postUrl);
        if (shareWinId) fd.append('winner_id', shareWinId);
        const r = await fetch('/api/me/social-share', {
            method: 'POST', body: fd,
            headers: { 'Authorization': 'Bearer ' + API.token() },
            credentials: 'include',
        });
        const j = await r.json();
        if (!r.ok || j.ok === false) throw new Error(j.error || ('HTTP ' + r.status));
        closeShareSheet();
        toast(I18N.t('submitted_pending'));
    } catch (e) {
        toast(e.message);
    } finally {
        btn.disabled = false;
    }
}

// Tap outside sheet content to close
['proofSheet','shareSheet'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
        if (e.target.id === id) document.getElementById(id).classList.remove('show');
    });
});

load();
</script>
</body></html>
