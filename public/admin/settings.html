<!doctype html>
<html><head><meta charset="utf-8"><title>Settings</title>
<link rel="stylesheet" href="/admin/css/admin.css"></head><body>
<script src="/admin/js/admin.js"></script>
<script>document.write(sidebar('settings'));</script>
<main>
<h1>Settings</h1>
<table id="t" style="max-width:720px"><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody></tbody></table>
<div style="margin-top:16px">
    <button class="btn btn-pri" onclick="save()">Save all</button>
</div>
<script>
async function load() {
    const rows = await Admin.get('/api/admin/settings');
    document.querySelector('#t tbody').innerHTML = rows.map(r => `
        <tr><td>${r.key}</td><td><input style="width:100%" id="s_${r.key}" value="${(r.value||'').replace(/"/g,'&quot;')}"></td></tr>
    `).join('');
}
async function save() {
    const items = {};
    document.querySelectorAll('[id^="s_"]').forEach(el => items[el.id.substring(2)] = el.value);
    await Admin.post('/api/admin/settings', { items });
    alert('Saved');
}
load();
</script>
</main></body></html>
