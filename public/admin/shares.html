<!doctype html>
<html><head><meta charset="utf-8"><title>Social Shares — JackOne Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css">
<style>
    .filter-row { display: flex; gap: 8px; margin-bottom: 18px; }
    .filter-row button {
        padding: 6px 14px; border: 1px solid var(--bd); border-radius: 999px;
        background: transparent; color: var(--tx-mid); font-size: 12px; cursor: pointer;
    }
    .filter-row button.active {
        background: var(--gold-grad); color: #1a1407; border-color: transparent;
        font-weight: 700;
    }
    .media-cell { width: 140px; }
    .media-cell img {
        width: 120px; height: 120px; object-fit: cover; border-radius: 10px;
        border: 1px solid var(--bd); cursor: zoom-in; display: block;
    }
    .meta-cell { font-size: 12px; line-height: 1.5; min-width: 180px; }
    .meta-cell .label { color: var(--tx-mute); }
    .meta-cell a { color: #60a5fa; text-decoration: underline; word-break: break-all; }
    .action-cell { display: flex; gap: 6px; flex-wrap: wrap; min-width: 180px; }
    .action-cell button { font-size: 11px; padding: 6px 10px; white-space: nowrap; }
    .pill-approved { background: rgba(34,197,94,.15);  color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
    .pill-rejected { background: rgba(255,59,59,.15);  color: var(--red-2); border: 1px solid rgba(255,59,59,.3); }
    .platform-badge {
        display: inline-block; padding: 3px 10px; border-radius: 999px;
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        background: rgba(168,85,247,.15); color: #c084fc;
        border: 1px solid rgba(168,85,247,.3);
    }

    .lightbox {
        position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 99;
        display: none; align-items: center; justify-content: center; cursor: zoom-out;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
</style>
</head><body>
<script src="/admin/js/admin.js"></script>
<script>document.write(sidebar('shares'));</script>
<main>
<h1>Social Shares — engagement moderation</h1>
<p class="muted" style="margin-top:-4px;margin-bottom:16px;font-size:13px;">
    Members submit screenshots of their JackOne posts on social media. Approving grants free draws.
</p>

<div class="filter-row">
    <button class="filter active" data-status="pending">Pending</button>
    <button class="filter" data-status="approved">Approved</button>
    <button class="filter" data-status="rejected">Rejected</button>
    <button class="filter" data-status="">All</button>
</div>

<table id="t"><thead><tr>
    <th>ID</th>
    <th>User</th>
    <th>Platform</th>
    <th>Screenshot</th>
    <th>Post link</th>
    <th>Status</th>
    <th>Submitted</th>
    <th>Action</th>
</tr></thead><tbody></tbody></table>

<div class="lightbox" id="lb"><img id="lbImg"></div>

<script>
const STATUS_PILL = { pending: 'pill-pending', approved: 'pill-approved', rejected: 'pill-rejected' };
let currentStatus = 'pending';

function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
}

function actionCell(s) {
    if (s.status !== 'pending') {
        return s.reject_reason
            ? `<span class="muted" style="font-size:11px;">${escapeHtml(s.reject_reason)}</span>`
            : `<span class="muted" style="font-size:11px;">+${s.reward_draws} free draw(s)</span>`;
    }
    return `
        <button class="btn btn-ok"  onclick="approve(${s.id})">Approve</button>
        <button class="btn btn-del" onclick="reject(${s.id})">Reject</button>`;
}

async function load() {
    const url = currentStatus ? '/api/admin/shares?status=' + currentStatus : '/api/admin/shares';
    const rows = await Admin.get(url);
    const tbody = document.querySelector('#t tbody');
    if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="muted" style="text-align:center;padding:40px;">Nothing in this queue.</td></tr>`;
        return;
    }
    tbody.innerHTML = rows.map(s => `
        <tr>
            <td>${s.id}</td>
            <td>@${escapeHtml(s.username)}</td>
            <td><span class="platform-badge">${escapeHtml(s.platform)}</span></td>
            <td class="media-cell">
                <img src="${escapeHtml(s.proof_url)}" alt="screenshot" onclick="openLb('${escapeHtml(s.proof_url)}')">
            </td>
            <td class="meta-cell">
                ${s.post_url
                    ? `<a href="${escapeHtml(s.post_url)}" target="_blank" rel="noopener">${escapeHtml(s.post_url)}</a>`
                    : `<span class="muted">—</span>`}
            </td>
            <td><span class="pill ${STATUS_PILL[s.status]}">${s.status}</span></td>
            <td class="muted" style="font-size:12px;">${s.created_at}</td>
            <td class="action-cell">${actionCell(s)}</td>
        </tr>
    `).join('');
}

async function approve(id) {
    if (!confirm('Approve this share? Free draws will be credited to the user.')) return;
    try { await Admin.post('/api/admin/shares/approve', { id }); load(); }
    catch (e) { alert('Failed: ' + e.message); }
}
async function reject(id) {
    const reason = prompt('Reason for rejection (the user will see this):');
    if (!reason) return;
    try { await Admin.post('/api/admin/shares/reject', { id, reason }); load(); }
    catch (e) { alert('Failed: ' + e.message); }
}

function openLb(src) {
    document.getElementById('lbImg').src = src;
    document.getElementById('lb').classList.add('show');
}
document.getElementById('lb').addEventListener('click', () => {
    document.getElementById('lb').classList.remove('show');
});

document.querySelectorAll('.filter').forEach(b => {
    b.addEventListener('click', () => {
        document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        currentStatus = b.dataset.status;
        load();
    });
});

load();
</script>
</main></body></html>
